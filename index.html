<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mount Bayou Heritage | A Survival Story</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

        :root {
            --bg-dark: #0a0605;
            --bg-panel: #120a08;
            --text-main: #e8dcc8;
            --text-muted: #8a7860;
            --accent-red: #8B1A0A;
            --accent-gold: #b7950b;
            --accent-blue: #4a7a9b;
            --accent-purple: #8e44ad;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'EB Garamond', serif;
            overflow-x: hidden;
        }

        /* --- Animations --- */
        @keyframes ember {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }

        @keyframes heroLeft {
            from { opacity: 0; transform: translateX(-60px) rotateY(15deg); }
            to { opacity: 1; transform: translateX(0) rotateY(0); }
        }

        @keyframes heroRight {
            from { opacity: 0; transform: translateX(60px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        /* --- 3D Book Styles --- */
        .book-scene {
            perspective: 1000px;
            display: inline-block;
        }
        
        .book-cover-wrap {
            position: relative;
            transform-style: preserve-3d;
            transform: rotateY(-25deg) rotateX(5deg);
            transition: transform 0.5s ease;
            width: 300px;
            height: 450px;
            margin: 0 auto;
        }

        .book-cover-wrap:hover {
            transform: rotateY(-15deg) rotateX(2deg) scale(1.02);
        }

        .book-cover-img {
            width: 100%;
            height: 100%;
            border-radius: 2px 8px 8px 2px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.8);
            position: relative;
            z-index: 2;
            background: #1a0f0a;
            overflow: hidden;
        }

        .book-cover-art {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .book-cover-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 2px 8px 8px 2px;
        }

        .book-spine {
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 100%;
            background: linear-gradient(to right, #2c1810, #1a0f0a);
            transform: rotateY(90deg) translateZ(-20px); /* Adjusted for visual balance */
            transform-origin: left;
            border-radius: 2px 0 0 2px;
            box-shadow: inset -2px 0 5px rgba(0,0,0,0.5);
        }

        .book-glow {
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: radial-gradient(circle, rgba(139, 26, 10, 0.2) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            filter: blur(20px);
            animation: pulse-glow 4s infinite alternate;
        }

        @keyframes pulse-glow {
            from { opacity: 0.5; }
            to { opacity: 0.8; }
        }

        /* --- Utilities --- */
        .cinzel { font-family: 'Cinzel', serif; }
        
        .btn-primary {
            background: linear-gradient(135deg, #8B1A0A 0%, #5a1006 100%);
            color: #f4ead6;
            border: 1px solid #a52a1a;
            padding: 14px 32px;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(139, 26, 10, 0.3);
            border-radius: 2px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 26, 10, 0.5);
            background: linear-gradient(135deg, #9e2b1b 0%, #6b1208 100%);
        }

        .btn-ghost {
            background: transparent;
            color: #8a7860;
            border: 1px solid #3a2a20;
            padding: 12px 24px;
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .btn-ghost:hover {
            border-color: #8B1A0A;
            color: #e8dcc8;
            background: rgba(139, 26, 10, 0.1);
        }

        .nav-link {
            color: #8a7860;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
            cursor: pointer;
        }
        .nav-link:hover { color: #e8dcc8; }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0605; }
        ::-webkit-scrollbar-thumb { background: #3a2a20; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8B1A0A; }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-content {
            background: #120a08;
            border: 1px solid #3a2a20;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            position: relative;
        }

        .sample-text {
            font-family: 'EB Garamond', serif;
            line-height: 1.8;
            color: #c0a880;
            font-size: 16px;
            column-count: 1;
        }
        
        @media (min-width: 768px) {
            .sample-text { column-count: 2; column-gap: 40px; }
        }

        .drop-cap {
            float: left;
            font-size: 3.5em;
            line-height: 0.8;
            margin-right: 8px;
            margin-top: 4px;
            color: #8B1A0A;
            font-family: 'Cinzel', serif;
        }

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Data & Constants ---
        const STRIPE_LINK = "https://buy.stripe.com/test_yourLinkHere";
        const PRICE = "21.99";

        const CHARACTERS = [
            { symbol: "◈", name: "Jinx King", role: "The Strategist", color: "#c0392b", quote: '"Three beats. Assess."', desc: "Three thumb-taps before every move. Pattern recognition under pressure.", trait: "Thumb-taps thigh · 3 beats · always 3" },
            { symbol: "◆", name: "Ashley Morrison", role: "The Anchor", color: "#e67e22", quote: '"When she goes quiet, danger is already here."', desc: "Gum popping loud as armor. Loyal past strategy.", trait: "Gum pops = fear level · red is her fight color" },
            { symbol: "◇", name: "De'Andra Williams", role: "The Soldier", color: "#4a7a9b", quote: '"Blood handles blood."', desc: "Sharpens her blade like a lullaby. Mercy is math.", trait: "Knife ritual · eye contact as a weapon" },
            { symbol: "◉", name: "Nathon Jones", role: "The Analyst", color: "#8e44ad", quote: '"Sees patterns others wish weren\'t real."', desc: "Fibonacci finger taps when anxious. Big brain, soft heart.", trait: "Fibonacci taps · pattern recognition" },
            { symbol: "⬡", name: "Karrington Xiao", role: "The Fixer", color: "#b7950b", quote: '"Fixes problems while others argue."', desc: "Tradition, instinct, and survival knowledge passed through generations.", trait: "Acts first · generational instinct" },
            { symbol: "◌", name: "Jordan Juarez", role: "The Valve", color: "#1e8449", quote: '"When the humor dies, the world gets darker."', desc: "Jokes to keep fear from spreading. The group's tension valve.", trait: "Pop culture reflex · humor as oxygen" },
            { symbol: "◎", name: "Amber James", role: "The Evolution", color: "#16a085", quote: '"She still remembers your name."', desc: "The infection didn't erase her. It changed her.", trait: "Hums pre-infection · rhythm shifts" }
        ];

        const SAMPLE_TEXT = `The bell didn't ring on schedule.

That's what I noticed first — not the smell of copper that would come later, not the sneakers squealing on tile or the wet clicking of teeth. Just the silence where the bell should've been.

Jim Hill High, 2:47 PM. Thirteen minutes to freedom.

I was in the hall bathroom, third stall from the left, trying to get the gum out of my hair that Ashley had put there during fifth period — not mean, just careless, which is somehow worse.

I heard the first scream before I heard anything break.

It wasn't like the movies. No one in the movies sounds like that — like they forgot how to be a person mid-sentence. Like language just... stops being useful.

I held still.

Three beats. Assess.

What I knew: screaming in the east hall. At least two voices. One stopping.
What I didn't know: everything else.
What I could control: the next ten seconds.

I pushed out of the stall and cracked the door.

The hall was wrong.

Three students moving toward the south stairwell — moving wrong, each step a spasm, like marionettes with half the strings cut. Gray skin. White eyes. Something dark slick down their chins I wasn't ready to name yet.

I let the door close.

My thumb tapped my thigh three times without me deciding to do it. Old habit. Count the variables. Count what you have.

I thought about Mama then — just a flash, just her voice:

"The land remembers what people forget. Pay attention to what's old."

I didn't know what that meant yet.

I would.`;

        // --- Components ---

        const Embers = ({ count = 20 }) => {
            const particles = useMemo(() => Array.from({ length: count }, (_, i) => ({
                id: i,
                x: Math.random() * 100,
                y: Math.random() * 100,
                delay: Math.random() * 5,
                duration: 3 + Math.random() * 4
            })), [count]);

            return (
                <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden', zIndex: 1 }}>
                    {particles.map(p => (
                        <div key={p.id} style={{
                            position: 'absolute',
                            left: `${p.x}%`,
                            top: `${p.y}%`,
                            width: '2px',
                            height: '2px',
                            background: '#ff4d00',
                            borderRadius: '50%',
                            boxShadow: '0 0 6px #ff4d00',
                            opacity: 0,
                            animation: `ember ${p.duration}s ${p.delay}s infinite`
                        }} />
                    ))}
                </div>
            );
        };

        const FadeIn = ({ children, delay = 0, direction = 'up' }) => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsVisible(true);
                        observer.disconnect();
                    }
                }, { threshold: 0.1 });
                
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);

            const transform = direction === 'up' ? 'translateY(40px)' : 
                              direction === 'left' ? 'translateX(-40px)' : 'translateX(40px)';

            return (
                <div ref={ref} style={{
                    opacity: isVisible ? 1 : 0,
                    transform: isVisible ? 'none' : transform,
                    transition: `opacity 0.8s ease ${delay}s, transform 0.8s ease ${delay}s`
                }}>
                    {children}
                </div>
            );
        };

        const NavBar = ({ onOpenSample }) => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav style={{
                    position: 'fixed',
                    top: 0,
                    left: 0,
                    right: 0,
                    zIndex: 100,
                    padding: '20px 40px',
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                    background: scrolled ? 'rgba(10, 6, 5, 0.95)' : 'transparent',
                    backdropFilter: scrolled ? 'blur(10px)' : 'none',
                    borderBottom: scrolled ? '1px solid rgba(60, 20, 8, 0.5)' : 'none',
                    transition: 'all 0.3s ease'
                }}>
                    <div className="cinzel" style={{ fontSize: '14px', letterSpacing: '4px', color: '#8B1A0A', fontWeight: 'bold' }}>
                        MOUNT BAYOU
                    </div>
                    <div style={{ display: 'flex', gap: '30px', alignItems: 'center' }}>
                        <span className="nav-link" onClick={onOpenSample}>Read Sample</span>
                        <button className="btn-primary" style={{ padding: '10px 20px', fontSize: '12px' }} onClick={() => window.open(STRIPE_LINK, '_blank')}>
                            Buy ${PRICE}
                        </button>
                    </div>
                </nav>
            );
        };

        const Hero = ({ onOpenSample }) => (
            <section style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', padding: '100px 20px' }}>
                <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(circle at 50% 30%, #1c0a02 0%, #0a0605 70%)', zIndex: -2 }}></div>
                <Embers />
                
                <div style={{ 
                    display: 'flex', 
                    alignItems: 'center', 
                    justifyContent: 'center', 
                    gap: '60px', 
                    maxWidth: '1200px', 
                    width: '100%',
                    flexWrap: 'wrap'
                }}>

                    </section>

                    {/* Newsletter */}
                    <section style={{ padding: '80px 20px', background: 'linear-gradient(to bottom, rgba(50,8,2,0.2), transparent)', borderTop: '1px solid #3a1510' }}>
                        <FadeIn>
                            <div style={{ textAlign: 'center', maxWidth: '500px', margin: '0 auto' }}>
                                <div style={{ fontSize: '30px', marginBottom: '15px' }}>🩸</div>
                                <h2 className="cinzel" style={{ marginBottom: '15px' }}>Book Two Is Coming</h2>
                                <p style={{ color: '#8a7860', marginBottom: '25px', fontSize: '14px' }}>
                                    The rules are still being written. Get notified when the next chapter drops.
                                </p>
                                
                                {emailStatus === 'success' ? (
                                    <div style={{ color: '#4a7a9b', padding: '15px', background: 'rgba(74, 122, 155, 0.1)', borderRadius: '4px' }}>
                                        ✓ You're on the list. Stay dangerous.
                                    </div>
                                ) : (
                                    <form onSubmit={handleSubscribe} style={{ display: 'flex', gap: '10px' }}>
                                        <input 
                                            type="email" 
                                            placeholder="your@email.com" 
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            style={{ 
                                                flex: 1, 
                                                padding: '12px 15px', 
                                                background: '#0a0605', 
                                                border: '1px solid #3a2a20', 
                                                color: '#e8dcc8',
                                                borderRadius: '2px',
                                                fontFamily: 'EB Garamond'
                                            }}
                                        />
                                        <button type="submit" className="btn-primary" style={{ padding: '12px 20px' }}>
                                            Notify Me
                                        </button>
                                    </form>
                                )}
                            </div>
                        </FadeIn>
                    </section>

                    {/* Final CTA */}
                    <section style={{ padding: '100px 20px', textAlign: 'center', borderTop: '1px solid #2a1a10' }}>
                        <FadeIn>
                            <div style={{ fontSize: '12px', letterSpacing: '4px', color: '#5a3a2a', marginBottom: '20px' }}>RULE 10</div>
                            <h2 style={{ fontSize: 'clamp(24px, 4vw, 40px)', color: '#f4ead6', fontStyle: 'italic', maxWidth: '700px', margin: '0 auto 40px', lineHeight: '1.3' }}>
                                "Mercy isn't clean. It's a choice you live with after."
                            </h2>
                            <button className="btn-primary" style={{ fontSize: '16px', padding: '18px 40px' }} onClick={() => window.open(STRIPE_LINK, '_blank')}>
                                Get the Book — ${PRICE}
                            </button>
                        </FadeIn>
                    </section>

                    {/* Footer */}
                    <footer style={{ padding: '40px 20px', textAlign: 'center', borderTop: '1px solid #1a1008', color: '#3a2a20', fontSize: '12px' }}>
                        © Mount Bayou Heritage Series · Secured by Stripe · Instant PDF Delivery
                    </footer>

                    <SampleModal isOpen={isSampleOpen} onClose={() => setIsSampleOpen(false)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
