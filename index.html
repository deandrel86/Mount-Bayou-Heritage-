<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your full and detailed description here">
    <style>
        /* Improved color contrast */
        .muted {
            color: #c9b896; /* Muted color improved */
        }

        /* Added button disabled states */
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Added styles for sr-only:focus */
        .sr-only:focus {
            position: absolute;
            width: auto;
            height: auto;
            top: 0;
            left: 0;
            background: white;
            z-index: 100;
            /* Visibility for keyboard accessibility */
        }
    </style>
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Product",
            "name": "Your Product Name Here",
            "offers": {
                "@type": "Offer",
                "price": "Your Price Here",
                "priceValidUntil": "2026-12-31"
            }
        }
    </script>
</head>
<body>
    <nav>
        <!-- Skip link for accessibility -->
        <a href="#maincontent" class="sr-only:focus">Skip to main content</a>
    </nav>
    <main id="maincontent">
        <h1>Your Main Content Here</h1>
        <form>
            <label for="newsletter">Subscribe to our newsletter:</label>
            <input type="email" id="newsletter" name="newsletter">
            <button type="submit">Subscribe</button>
        </form>
        <img src="book-cover.jpg" alt="Book cover description here" loading="lazy">
        <!-- Other content -->
    </main>
</body>
</html>
